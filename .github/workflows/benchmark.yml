name: Benchmark

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the branch the release targets (usually main) so the
          # auto-commit action can push RESULTS.md back instead of a detached HEAD.
          ref: ${{ github.event.release.target_commitish || 'main' }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make benchmark-live VERSION=${{ github.ref_name }}

      - name: Commit updated RESULTS.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bench: update RESULTS.md for ${{ github.ref_name }} [skip ci]"
          file_pattern: benchmark/RESULTS.md
