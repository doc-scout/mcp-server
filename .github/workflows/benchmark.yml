name: Benchmark

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Benchmark mode"
        type: choice
        options: [theoretical, live]
        default: theoretical

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out a real branch so git-auto-commit-action can push back.
          # - release events: use target_commitish (e.g. "main")
          # - tag push: ref_type == 'tag', so fall back to 'main'
          # - workflow_dispatch: ref is refs/heads/<branch>, which checkout accepts
          ref: ${{ github.event.release.target_commitish || (github.ref_type == 'tag' && 'main' || github.ref) }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "theoretical" ]; then
            make benchmark VERSION=${{ github.ref_name }}
          else
            make benchmark-live VERSION=${{ github.ref_name }}
          fi
      - name: Print RESULTS.md
        run: cat benchmark/RESULTS.md

      - name: Add benchmark results to job summary
        run: cat benchmark/RESULTS.md >> $GITHUB_STEP_SUMMARY

      - name: Upload RESULTS.md to release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag' || github.event_name == 'release'
        with:
          tag_name: ${{ github.ref_name }}
          files: benchmark/RESULTS.md
