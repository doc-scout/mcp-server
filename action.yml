name: DocScout Graph Analysis
description: Scans this repository and builds a knowledge graph. Posts a summary to GitHub Step Summary and optionally as a PR comment.
author: Doc Scout

inputs:
  github_token:
    description: GitHub token with repo read access
    required: true
  version:
    description: DocScout version to install (e.g. 'v0.1.0'). Defaults to 'latest'.
    required: false
    default: 'latest'
  comment_on_pr:
    description: Post a PR comment with graph stats (true/false)
    required: false
    default: 'false'
  max_nodes:
    description: Maximum number of nodes in the service topology diagram
    required: false
    default: '20'
  max_edges:
    description: Maximum number of edges in the service topology diagram
    required: false
    default: '40'

outputs:
  entity_count:
    description: Total number of entities in the graph
    value: ${{ steps.scan.outputs.entity_count }}
  relation_count:
    description: Total number of relations in the graph
    value: ${{ steps.scan.outputs.relation_count }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: '${{ github.action_path }}/go.mod'
        cache: false

    - name: Install DocScout
      shell: bash
      run: ${{ github.action_path }}/bin/install-docscout.sh
      env:
        DOCSCOUT_VERSION: ${{ inputs.version }}

    - name: Run scan
      id: scan
      shell: bash
      run: ${{ github.action_path }}/bin/run-scan.sh
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        COMMENT_ON_PR: ${{ inputs.comment_on_pr }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        MAX_NODES: ${{ inputs.max_nodes }}
        MAX_EDGES: ${{ inputs.max_edges }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
