---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docscout-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docscout-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "docscout-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docscout-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: docscout-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "docscout-mcp.configmapName" . }}
            {{- if or .Values.secrets.githubToken .Values.secrets.mcpHttpBearerToken .Values.secrets.githubWebhookSecret }}
            - secretRef:
                name: {{ include "docscout-mcp.secretName" . }}
            {{- end }}
          {{/* Conditional webhook env var: only injected when webhookEnabled and a secret is provided. */}}
          {{- if and .Values.config.webhookEnabled .Values.secrets.githubWebhookSecret }}
          env:
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "docscout-mcp.secretName" . }}
                  key: GITHUB_WEBHOOK_SECRET
          {{- end }}
          {{- with .Values.persistence }}
          {{- if .enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      {{- with .Values.persistence }}
      {{- if .enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "docscout-mcp.pvcName" $ }}
      {{- end }}
      {{- end }}
