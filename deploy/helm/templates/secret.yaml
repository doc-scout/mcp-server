{{/*
Only render the Secret when at least one secret value has been provided.
This avoids creating an empty Secret that provides no value and could
cause envFrom to fail if keys are absent.
*/}}
{{- if or .Values.secrets.githubToken .Values.secrets.mcpHttpBearerToken .Values.secrets.githubWebhookSecret -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docscout-mcp.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docscout-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
data:
  {{- if .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.mcpHttpBearerToken }}
  MCP_HTTP_BEARER_TOKEN: {{ .Values.secrets.mcpHttpBearerToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.githubWebhookSecret }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | b64enc | quote }}
  {{- end }}
{{- end }}
