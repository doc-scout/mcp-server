#
# Imperative alternative:
#   kubectl create secret generic docscout-mcp-secrets \
#     --namespace docscout-mcp \
#     --from-literal=GITHUB_TOKEN='<your-token>' \
#     --from-literal=MCP_HTTP_BEARER_TOKEN='<your-bearer-token>' \
#     --from-literal=GITHUB_WEBHOOK_SECRET='<your-webhook-secret>'
---
apiVersion: v1
kind: Secret
metadata:
  name: docscout-mcp-secrets
  namespace: docscout-mcp
  labels:
    app.kubernetes.io/name: docscout-mcp
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Required: base64-encoded GitHub personal access token or GitHub App token.
  # Generate with: echo -n '<your-token>' | base64
  GITHUB_TOKEN: ""

  # Optional: bearer token used to authenticate HTTP MCP clients.
  # Leave empty (or remove) if HTTP bearer auth is not required.
  # Generate with: echo -n '<your-bearer-token>' | base64
  MCP_HTTP_BEARER_TOKEN: ""

  # Optional: HMAC secret used to verify incoming GitHub webhook payloads.
  # Only required when GITHUB_WEBHOOK_SECRET is set and HTTP_ADDR is configured.
  # Generate with: echo -n '<your-webhook-secret>' | base64
  GITHUB_WEBHOOK_SECRET: ""
